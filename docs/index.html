<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>過去問アプリ｜ランチャー</title>
<meta name="robots" content="noindex">
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; padding: 28px 16px 40px;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    background: #f1f5f9; color: #0f172a;
    display: flex; flex-direction: column; align-items: center;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #0b1220; color: #e2e8f0; }
    .card { background: #111a2e; }
    .sub { color: #94a3b8; }
  }
  h1 { font-size: 20px; margin: 4px 0 2px; letter-spacing: .02em; }
  .lead { font-size: 13px; color: #64748b; margin: 0 0 22px; }
  .grid {
    width: 100%; max-width: 520px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }
  .card {
    display: flex; flex-direction: column; gap: 6px;
    text-decoration: none; color: inherit;
    background: #fff; border-radius: 16px; padding: 18px 16px;
    border: 1px solid rgba(100,116,139,.18);
    box-shadow: 0 1px 3px rgba(15,23,42,.08);
    transition: transform .08s ease;
  }
  .card:active { transform: scale(.97); }
  .chip {
    align-self: flex-start; font-size: 11px; font-weight: 700;
    color: #fff; padding: 3px 9px; border-radius: 999px;
  }
  .teal  { background: #0e7490; }
  .indigo{ background: #4f46e5; }
  .name { font-size: 16px; font-weight: 700; line-height: 1.3; }
  .sub  { font-size: 12px; color: #64748b; }
  footer { margin-top: 26px; font-size: 11px; color: #94a3b8; text-align: center; line-height: 1.6; }
</style>
</head>
<body>
  <h1>過去問アプリ</h1>
  <p class="lead">使うアプリを選んでください</p>

  <div class="grid">
    <a class="card" href="./db/">
      <span class="chip teal">臨床検査技師</span>
      <span class="name">ケンゼミ<br>過去問データベース</span>
      <span class="sub">検索・テスト編成・印刷</span>
    </a>
    <a class="card" href="./dojo/">
      <span class="chip teal">臨床検査技師</span>
      <span class="name">ケンゼミ<br>過去問道場</span>
      <span class="sub">1問ずつ演習・即採点</span>
    </a>
    <a class="card" href="./houzemi/">
      <span class="chip indigo">診療放射線技師</span>
      <span class="name">ホウゼミ<br>過去問データベース</span>
      <span class="sub">検索・テスト編成・印刷</span>
    </a>
    <a class="card" href="./houzemi-dojo/">
      <span class="chip indigo">診療放射線技師</span>
      <span class="name">ホウゼミ<br>過去問道場</span>
      <span class="sub">1問ずつ演習・即採点</span>
    </a>
  </div>

  <footer>
    各アプリを開いてから「ホーム画面に追加」すると、<br>それぞれ独立したアプリとして使えます。
  </footer>

  <script>
    // このランチャー自身はPWA化しない（配下アプリのscopeと衝突させない）。
    // 旧バージョンでルート(/kakomon-app/)に登録された Service Worker が
    // 残っていると古いキャッシュを返すため、ルート用SWだけ掃除する。
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) {
          try {
            var p = new URL(r.scope).pathname;
            if (p === "/kakomon-app/" || p === "/") r.unregister();
          } catch (e) {}
        });
      }).catch(function () {});
    }
  </script>
</body>
</html>
