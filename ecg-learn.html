<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心電図 波形の特徴を学ぶ | 正常と見比べる学習ページ</title>
<style>
  :root{
    --bg:#0b0e17; --bg2:#0f1320; --panel:#161b2b; --panel2:#1e2436; --panel3:#262d43;
    --txt:#eef1f8; --sub:#9aa3bd; --line:#2a3247;
    --accent:#7aa2ff; --accent2:#56e1c4; --grad:linear-gradient(135deg,#6d8bff,#56e1c4);
    --pink:#ff6b9a; --warn:#ffcf6b;
    --ecgbg:#fff6f6; --gridmin:#f4cccc; --gridmaj:#e79b9b; --trace:#0d1320; --ghost:#aab2c4;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",system-ui,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#172036 0%,var(--bg) 60%);
    color:var(--txt);line-height:1.65;-webkit-text-size-adjust:100%;min-height:100vh}
  .wrap{max-width:920px;margin:0 auto;padding:0 16px 40px}
  header{padding:20px 16px 8px;text-align:center}
  header h1{margin:0;font-size:1.3rem;letter-spacing:.02em;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;display:inline-block}
  header .sub{color:var(--sub);font-size:.8rem;margin-top:3px}

  /* レベル切替（セグメント） */
  .levels{display:flex;justify-content:center;margin:14px 0 18px}
  .seg{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px}
  .seg button{background:transparent;border:none;color:var(--sub);font-family:inherit;font-weight:700;
    font-size:.9rem;padding:8px 18px;border-radius:9px;cursor:pointer;transition:.18s;white-space:nowrap}
  .seg button.on{background:var(--grad);color:#08110e;box-shadow:0 4px 14px rgba(86,225,196,.25)}
  .seg .lv{font-size:.7rem;opacity:.8;font-weight:600;margin-left:5px}

  /* 疾患タブ（横スクロール1列・折り返さない） */
  .dtabs-wrap{position:relative;margin-bottom:16px}
  .dtabs{display:flex;gap:9px;overflow-x:auto;padding:4px 2px 8px;scroll-snap-type:x proximity;
    scrollbar-width:thin;scrollbar-color:#39425e transparent}
  .dtabs::-webkit-scrollbar{height:6px}
  .dtabs::-webkit-scrollbar-thumb{background:#39425e;border-radius:6px}
  .dtab{flex:0 0 auto;scroll-snap-align:start;display:flex;flex-direction:column;align-items:center;gap:3px;
    min-width:84px;padding:11px 12px;background:var(--panel);border:1.5px solid var(--line);border-radius:14px;
    cursor:pointer;transition:.16s;color:var(--sub)}
  .dtab:hover{transform:translateY(-1px);border-color:var(--accent)}
  .dtab .ic{font-size:1.4rem;line-height:1}
  .dtab .nm{font-size:.76rem;font-weight:700;white-space:nowrap}
  .dtab.on{border-color:transparent;background:linear-gradient(160deg,#243150,#1b2238);color:var(--txt);
    box-shadow:0 0 0 1.5px var(--accent),0 8px 20px rgba(0,0,0,.35)}
  .dtab.on .ic{filter:drop-shadow(0 0 8px rgba(122,162,255,.6))}

  .card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);
    border-radius:18px;padding:18px;box-shadow:0 12px 40px rgba(0,0,0,.4)}
  .lhead{display:flex;align-items:center;gap:12px;margin-bottom:4px}
  .lhead .badge{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:1.6rem;
    background:var(--panel3);border:1px solid var(--line);flex:0 0 auto}
  .ltitle{font-size:1.22rem;font-weight:800;margin:0}
  .ldesc{color:var(--sub);font-size:.9rem;margin:8px 0 14px}

  .striplabel{font-size:.8rem;font-weight:700;margin:2px 2px 6px;display:flex;align-items:center;gap:8px;color:#cdd4e6}
  .striplabel .dot{width:9px;height:9px;border-radius:50%}
  .dot.n{background:var(--ghost)} .dot.c{background:var(--accent2)}
  .ecgbox{background:var(--ecgbg);border-radius:12px;padding:7px;overflow-x:auto;margin:0 0 16px;
    border:1px solid #e7c4c4;box-shadow:inset 0 1px 4px rgba(0,0,0,.12)}
  canvas{display:block;height:auto;max-width:none}

  /* 病期セグメント */
  .stagebar{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin:2px 0 14px}
  .stagebar .lbl{font-size:.78rem;color:var(--sub)}
  .stageseg{display:inline-flex;flex-wrap:wrap;background:var(--panel2);border:1px solid var(--line);
    border-radius:12px;padding:4px;gap:3px}
  .stageseg button{background:transparent;border:none;color:var(--sub);font-family:inherit;font-weight:700;
    font-size:.9rem;padding:9px 15px;border-radius:9px;cursor:pointer;transition:.18s;white-space:nowrap}
  .stageseg button:hover{color:var(--txt)}
  .stageseg button.on{background:var(--accent);color:#08111f;box-shadow:0 4px 12px rgba(122,162,255,.3)}
  .toggle{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:.84rem;color:var(--sub);
    cursor:pointer;user-select:none}
  .toggle input{accent-color:var(--accent2);width:16px;height:16px}
  .toggle.dis{opacity:.4;pointer-events:none}

  .feat{background:linear-gradient(180deg,#141a2b,#111626);border:1px solid #2b3550;border-radius:13px;padding:14px 16px}
  .feat h4{margin:0 0 8px;font-size:.92rem;color:var(--accent2);display:flex;align-items:center;gap:7px}
  .feat ul{margin:0;padding-left:1.15em}
  .feat li{font-size:.93rem;margin-bottom:4px}
  .feat li b{color:#ffd9e2}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:.74rem;color:var(--sub);margin-top:12px}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .lgline{width:20px;height:0;border-top:2px dashed var(--ghost)}
  .lgdot{width:9px;height:9px;border-radius:50%;background:var(--pink)}
  footer{color:var(--sub);font-size:.74rem;text-align:center;padding:24px 16px 10px}
</style>
</head>
<body>
<header>
  <h1>🫀 心電図 波形の特徴を学ぶ</h1>
  <div class="sub">正常と見比べ、ボタンで波形が“ぬるぬる”変化。見た目で覚える学習ページ</div>
</header>

<div class="wrap">
  <div class="levels">
    <div class="seg" id="levelSeg">
      <button data-lv="0">3級<span class="lv">入門</span></button>
      <button data-lv="1">2級<span class="lv">標準</span></button>
    </div>
  </div>

  <div class="dtabs-wrap"><div class="dtabs" id="dtabs"></div></div>

  <div class="card">
    <div class="lhead">
      <div class="badge" id="lbadge">🫀</div>
      <div>
        <div class="ltitle" id="ltitle"></div>
        <div class="ldesc" id="ldesc" style="margin:2px 0 0"></div>
      </div>
    </div>

    <div style="margin-top:14px">
      <div class="striplabel"><span class="dot n"></span>正常波形（基準）</div>
      <div class="ecgbox"><canvas id="ecgTop"></canvas></div>

      <div class="striplabel"><span class="dot c"></span><span id="curlabel">病態波形</span></div>
      <div class="ecgbox"><canvas id="ecgBot"></canvas></div>
    </div>

    <div class="stagebar">
      <span class="lbl">状態／病期：</span>
      <div class="stageseg" id="stageseg"></div>
      <label class="toggle" id="ghostWrap"><input type="checkbox" id="ghostchk"> 正常を重ねる</label>
    </div>

    <div class="feat">
      <h4 id="feathead">⭐ この波形の特徴</h4>
      <ul id="featlist"></ul>
      <div class="legend">
        <span><span class="lgline"></span>灰の破線＝正常波形（重ね表示時）</span>
        <span><span class="lgdot"></span>注目ポイント</span>
      </div>
    </div>
  </div>
</div>

<footer>心電図 波形学習ページ ・ 波形はJavaScriptで生成した教育用シミュレーションです（実際の診療判断には用いないでください）</footer>

<script>
/* =========================================================
   ECG 波形描画エンジン（生理学モデル：クイズ版と共通）
   ========================================================= */
const PX_MM=5, PX_S=PX_MM*25, PX_MV=PX_MM*10;
let _seed=1;
function seedReset(s){ _seed=(s>>>0)||1; }
function rnd(){ _seed=(_seed*1103515245+12345)&0x7fffffff; return _seed/0x7fffffff; }
function hash(str){ let h=2166136261; for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);} return h>>>0; }
function gauss(x,s){ return Math.exp(-(x*x)/(2*s*s)); }
function asym(x,wl,wr){ const s=x<0?wl:wr; return Math.exp(-(x*x)/(2*s*s)); }
function ramp(x,a,b){ if(x<=a)return 0; if(x>=b)return 1; return 0.5-0.5*Math.cos(Math.PI*(x-a)/(b-a)); }
function smoothWin(x,t0,t1){ const r=20; return ramp(x,t0-r,t0+r)*(1-ramp(x,t1-r,t1+r)); }
function poly(pts,x){ if(!pts.length||x<pts[0][0]||x>pts[pts.length-1][0])return 0;
  for(let i=0;i<pts.length-1;i++){ const a=pts[i],b=pts[i+1]; if(x>=a[0]&&x<=b[0]){ const f=(x-a[0])/(b[0]-a[0]); return a[1]+(b[1]-a[1])*f; } } return 0; }
function beatValue(dt,m){ let v=0;
  if(m.P) v+=m.P.a*gauss(dt-m.P.c,m.P.w);
  if(m.qrs) v+=poly(m.qrs,dt);
  if(m.st&&m.st.level) v+=m.st.level*smoothWin(dt,m.st.t0,m.st.t1);
  if(m.T) v+=m.T.a*asym(dt-m.T.c,m.T.wl,m.T.wr);
  if(m.U) v+=m.U.a*gauss(dt-m.U.c,m.U.w);
  if(m.bumps) for(const b of m.bumps) v+=b.a*gauss(dt-b.c,b.w);
  return v; }
function mNormal(o){
  o=o||{}; const A=o.amp==null?1:o.amp;
  const P=(o.pAmp===0)?null:(o.p===false?null:{a:(o.pAmp==null?0.13:o.pAmp),c:(o.pc==null?-160:o.pc),w:(o.pw==null?24:o.pw)});
  const q=o.qAmp==null?-0.09:o.qAmp, r=o.rAmp==null?1.15:o.rAmp, s=o.sAmp==null?-0.16:o.sAmp;
  const jt=o.jt==null?52:o.jt;
  const qrs=o.qrs||[[-50,0],[-38,A*q],[0,A*r],[30,A*s],[jt,0]];
  const st={level:(o.st==null?0:o.st),t0:jt,t1:(o.stEnd==null?385:o.stEnd)};
  const T=o.t===false?null:{a:(o.tAmp==null?0.32:o.tAmp),c:(o.tc==null?250:o.tc),wl:(o.twl==null?62:o.twl),wr:(o.twr==null?46:o.twr)};
  const U=(o.u&&o.u>0.002)?{a:o.u,c:(o.uc==null?410:o.uc),w:42}:null;
  const bumps=o.bumps||(o.prdep?[{a:-0.045,c:-95,w:34}]:[]);
  return {P,qrs,st,T,U,bumps}; }
function mWide(o){
  o=o||{}; const A=o.amp==null?1:o.amp; const pol=o.pol==null?1:o.pol;
  const qrs=pol>0?[[-72,0],[-54,A*0.12],[-10,A*0.55],[0,A*1.05],[28,A*0.55],[58,A*-0.15],[86,A*-0.55],[118,0]]
                 :[[-72,0],[-54,A*-0.12],[-10,A*-0.55],[0,A*-1.05],[28,A*-0.55],[58,A*0.15],[86,A*0.55],[118,0]];
  const T={a:pol*(o.tAmp==null?-0.42:o.tAmp),c:(o.tc==null?255:o.tc),wl:72,wr:56};
  return {P:null,qrs,st:{level:0,t0:118,t1:400},T,U:null,bumps:[]}; }
function bN(tR,o){ return {tR,m:mNormal(o)}; }
function bW(tR,o){ return {tR,m:mWide(o)}; }

function buildBeats(spec){
  const dur=spec.duration||3.7; const lead=spec.lead||'II';
  let beats=[],baseline=null,spikes=[];
  seedReset(hash(spec.kind+(spec.lead||'')));
  const rr=r=>60/r; const k=spec.kind;
  function addSinus(rate,o){ for(let t=0.5;t<dur-0.05;t+=rr(rate)) beats.push(bN(t,o)); }
  switch(k){
    case 'morph':{ const p=spec.params||{}; const rate=spec.rate||70; for(let t=0.5;t<dur-0.05;t+=rr(rate)) beats.push(bN(t,p)); break; }
    case 'sinus': addSinus(spec.rate||70,{}); break;
    case 'afib':{ let t=0.4; while(t<dur-0.05){ beats.push(bN(t,{p:false})); t+=0.38+rnd()*0.66; }
      baseline=tt=>0.06*Math.sin(2*Math.PI*8.5*tt)+0.04*Math.sin(2*Math.PI*6.1*tt+1.3)+0.03*Math.sin(2*Math.PI*11.5*tt+2.2); break; }
    case 'pvc':{ const T=[]; for(let t=0.5;t<dur-0.05;t+=rr(75)) T.push(t);
      T.forEach((t,i)=>{ if(i===2){ beats.push(bW(t-0.16,{})); } else beats.push(bN(t,{})); }); break; }
    case 'wpw':{ for(let t=0.5;t<dur-0.05;t+=rr(72)) beats.push({tR:t,m:{
      P:{a:0.13,c:-120,w:24}, qrs:[[-98,0],[-62,0.05],[-44,0.18],[-22,0.5],[0,1.05],[28,-0.1],[55,0]],
      st:{level:0,t0:55,t1:385}, T:{a:-0.16,c:250,wl:58,wr:46}, U:null, bumps:[] }}); break; }
    case 'rbbb':{ for(let t=0.5;t<dur-0.05;t+=rr(72)) beats.push({tR:t,m:{
      P:{a:0.12,c:-165,w:24}, qrs:[[-66,0],[-52,0.3],[-34,-0.22],[-6,0.06],[26,0.72],[50,0.56],[80,0]],
      st:{level:0,t0:80,t1:380}, T:{a:-0.32,c:250,wl:60,wr:48}, U:null, bumps:[] }}); break; }
    case 'lbbb':{ for(let t=0.5;t<dur-0.05;t+=rr(72)) beats.push({tR:t,m:{
      P:{a:0.12,c:-165,w:24}, qrs:[[-78,0],[-50,0.46],[-18,0.66],[6,0.58],[34,0.92],[60,0.5],[84,0]],
      st:{level:-0.06,t0:84,t1:390}, T:{a:-0.4,c:258,wl:64,wr:52}, U:null, bumps:[] }}); break; }
    case 'paced_v':{ for(let t=0.55;t<dur-0.05;t+=rr(70)){ spikes.push(t-0.04); beats.push(bW(t,{pol:1,amp:0.9})); } break; }
    default: addSinus(70,{});
  }
  return {beats,baseline,spikes,duration:dur,lead};
}
function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
function sampleV(build,tt){ let v=build.baseline?build.baseline(tt):0;
  for(const b of build.beats){ const dt=(tt-b.tR)*1000; if(dt>-360&&dt<520) v+=beatValue(dt,b.m); } return v; }

/* mod → 完全パラメータ（モーフィング補間用） */
function resolveMod(mod){
  const d={amp:1,pAmp:0.13,pc:-160,pw:24,qAmp:-0.09,rAmp:1.15,sAmp:-0.16,jt:52,st:0,stEnd:385,tAmp:0.32,tc:250,twl:62,twr:46,u:0,uc:410};
  const p=Object.assign({},d,mod||{});
  if(mod&&mod.p===false) p.pAmp=0;
  p.qrs=(mod&&mod.qrs)?mod.qrs.map(a=>a.slice()):[[-50,0],[-38,p.amp*p.qAmp],[0,p.amp*p.rAmp],[30,p.amp*p.sAmp],[p.jt,0]];
  delete p.p;
  return p;
}
function lerpParams(A,B,f){ const o={};
  for(const k in A){ if(k==='qrs')continue; if(typeof A[k]==='number') o[k]=A[k]+(B[k]-A[k])*f; }
  o.qrs=A.qrs.map((pt,i)=>[pt[0]+(B.qrs[i][0]-pt[0])*f, pt[1]+(B.qrs[i][1]-pt[1])*f]);
  return o; }

/* =========================================================
   キャンバス描画（グリッド＋較正＋ゴースト＋複数トレース＋注釈）
   ========================================================= */
function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
const DUR=3.7;
let _noise=null; (function(){ seedReset(98765); _noise=[]; for(let i=0;i<2400;i++) _noise.push(rnd()-0.5); })();
const wander=t=>0.016*Math.sin(2*Math.PI*0.22*t+0.6)+0.009*Math.sin(2*Math.PI*0.07*t);

function strokeTrace(ctx,build,xOff,baseY,W){
  ctx.beginPath(); let f=true;
  for(let px=xOff;px<=W-3;px+=0.5){ const t=(px-xOff)/PX_S;
    let v=sampleV(build,t)+wander(t)+0.005*_noise[(Math.round(px*2))%_noise.length];
    const y=baseY-v*PX_MV; if(f){ctx.moveTo(px,y);f=false;}else ctx.lineTo(px,y); }
  ctx.stroke();
}

function paintCanvas(canvas, items, opt){
  opt=opt||{};
  const W=Math.round(PX_S*DUR)+70, H=235;
  const dpr=Math.min(window.devicePixelRatio||1,2.5);
  if(canvas.width!==W*dpr){ canvas.width=W*dpr; canvas.height=H*dpr; canvas.style.width=W+'px'; canvas.style.height=H+'px'; }
  const ctx=canvas.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,W,H);
  ctx.fillStyle=getCss('--ecgbg'); ctx.fillRect(0,0,W,H);
  for(let x=0;x<=W;x+=PX_MM){ const m=(Math.round(x/PX_MM)%5===0); ctx.strokeStyle=m?getCss('--gridmaj'):getCss('--gridmin'); ctx.lineWidth=m?1.1:0.7; ctx.beginPath(); ctx.moveTo(x+.5,0); ctx.lineTo(x+.5,H); ctx.stroke(); }
  for(let y=0;y<=H;y+=PX_MM){ const m=(Math.round(y/PX_MM)%5===0); ctx.strokeStyle=m?getCss('--gridmaj'):getCss('--gridmin'); ctx.lineWidth=m?1.1:0.7; ctx.beginPath(); ctx.moveTo(0,y+.5); ctx.lineTo(W,y+.5); ctx.stroke(); }

  const baseY=H*0.55, xOff=60;
  const v2y=v=>baseY-v*PX_MV, t2x=t=>xOff+t*PX_S;

  // 較正波
  ctx.strokeStyle=getCss('--trace'); ctx.lineWidth=1.7; ctx.lineJoin='round'; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(12,baseY); ctx.lineTo(26,baseY); ctx.lineTo(26,v2y(1)); ctx.lineTo(44,v2y(1)); ctx.lineTo(44,baseY); ctx.lineTo(xOff,baseY); ctx.stroke();

  // 正常ゴースト
  if(opt.ghostBuild){
    ctx.strokeStyle=getCss('--ghost'); ctx.lineWidth=2.0; ctx.setLineDash([5,4]);
    strokeTrace(ctx,opt.ghostBuild,xOff,baseY,W); ctx.setLineDash([]);
  }

  // ペーシングスパイク
  items.forEach(it=>{ const b=it.build; if(b.spikes&&b.spikes.length){ ctx.globalAlpha=it.alpha; ctx.strokeStyle='#1763a8'; ctx.lineWidth=1.3;
    b.spikes.forEach(t=>{ const x=t2x(t); ctx.beginPath(); ctx.moveTo(x,baseY+5); ctx.lineTo(x,v2y(1.5)); ctx.stroke(); }); } });
  ctx.globalAlpha=1;

  // トレース
  ctx.strokeStyle=getCss('--trace'); ctx.lineWidth=2.0; ctx.lineJoin='round';
  items.forEach(it=>{ ctx.globalAlpha=it.alpha; strokeTrace(ctx,it.build,xOff,baseY,W); });
  ctx.globalAlpha=1;

  // 注釈
  if(opt.annotations&&opt.annotations.length&&opt.annoBuild){
    const cT=(W/2-xOff)/PX_S;
    const beat=opt.annoBuild.beats.reduce((a,b)=>Math.abs(b.tR-cT)<Math.abs(a.tR-cT)?b:a, opt.annoBuild.beats[0]);
    ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
    opt.annotations.forEach((an,i)=>{
      const tt=beat.tR+an.t/1000; let x=t2x(tt); const y=v2y(sampleV(opt.annoBuild,tt));
      const up=an.dir!=='down';
      let ly=up?Math.min(y-42,baseY-72):Math.max(y+42,baseY+58); ly+=(i%2)*(up?-17:17);
      x=Math.max(40,Math.min(W-40,x));
      ctx.strokeStyle=getCss('--pink'); ctx.lineWidth=1.4; ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(x,ly+(up?10:-10)); ctx.lineTo(x,y); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle=getCss('--pink'); ctx.beginPath(); ctx.arc(x,y,3.4,0,7); ctx.fill();
      const tw=ctx.measureText(an.label).width+14; const bx=Math.max(2,Math.min(W-tw-2,x-tw/2));
      ctx.fillStyle=getCss('--pink'); roundRect(ctx,bx,ly-11,tw,18,6); ctx.fill();
      ctx.fillStyle='#fff'; ctx.fillText(an.label,bx+tw/2,ly+3.5);
    });
    ctx.textAlign='left';
  }

  // 誘導ラベル
  ctx.fillStyle='#9c5050'; ctx.font='bold 13px sans-serif';
  ctx.fillText(opt.label||'', 9, 17);

/* =========================================================
   画面制御＋モーフィング
   ========================================================= */
const $=id=>document.getElementById(id);
const ecgTop=$('ecgTop'), ecgBot=$('ecgBot');
let LEVEL=0, SETS=[LESSONS_G3,LESSONS_G2];
let CUR={L:0,S:0}, ghost=false, raf=null;
const ANIM=560;
const easeIO=t=>t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;

function curSet(){ return SETS[LEVEL]; }
function stageSpec(L,st){
  if(st.mod!==undefined) return {kind:'morph', params:resolveMod(st.mod), lead:st.lead||L.lead, duration:DUR};
  return {kind:st.kind, lead:st.lead||L.lead, rate:st.rate, duration:DUR};
}
function ghostBuildFor(L,st,S){
  if(st.mod!==undefined && S!==0 && ghost) return buildBeats({kind:'morph',params:resolveMod({}),lead:st.lead||L.lead,duration:DUR});
  return null;
}
function paintTop(L){ paintCanvas(ecgTop,[{build:buildBeats({kind:'sinus',lead:L.lead,duration:DUR}),alpha:1}],{label:'正常 / '+L.lead}); }

function paintStatic(L,st,S){
  const spec=stageSpec(L,st); const build=buildBeats(spec);
  paintCanvas(ecgBot,[{build,alpha:1}],{annotations:st.hl||[],annoBuild:build,ghostBuild:ghostBuildFor(L,st,S),label:st.label+' / '+(st.lead||L.lead)});
}

function transition(oL,oS,nL,nS){
  if(raf) cancelAnimationFrame(raf);
  const set=curSet();
  const oLes=set[oL], oSt=oLes.stages[oS];
  const nLes=set[nL], nSt=nLes.stages[nS];
  const annos=nSt.hl||[];
  const label=nSt.label+' / '+(nSt.lead||nLes.lead);
  const gBuild=ghostBuildFor(nLes,nSt,nS);
  const sameDisease=(oL===nL);
  const bothMod=(oSt.mod!==undefined && nSt.mod!==undefined);

  if(sameDisease && bothMod){
    const A=resolveMod(oSt.mod), B=resolveMod(nSt.mod);
    const finalBuild=buildBeats({kind:'morph',params:B,lead:nLes.lead,duration:DUR});
    const t0=performance.now();
    const step=now=>{ const f=easeIO(Math.min(1,(now-t0)/ANIM));
      const build=buildBeats({kind:'morph',params:lerpParams(A,B,f),lead:nLes.lead,duration:DUR});
      paintCanvas(ecgBot,[{build,alpha:1}],{label, ghostBuild:gBuild, annotations:f>=1?annos:null, annoBuild:finalBuild});
      raf=f<1?requestAnimationFrame(step):null; };
    raf=requestAnimationFrame(step);
  } else {
    const ob=buildBeats(stageSpec(oLes,oSt)), nb=buildBeats(stageSpec(nLes,nSt));
    const t0=performance.now();
    const step=now=>{ const f=easeIO(Math.min(1,(now-t0)/ANIM));
      paintCanvas(ecgBot,[{build:ob,alpha:1-f},{build:nb,alpha:f}],{label, annotations:f>=1?annos:null, annoBuild:nb, ghostBuild:f>=1?gBuild:null});
      raf=f<1?requestAnimationFrame(step):null; };
    raf=requestAnimationFrame(step);
  }
}

function buildDtabs(){
  const set=curSet(); const c=$('dtabs'); c.innerHTML='';
  set.forEach((L,i)=>{ const d=document.createElement('div'); d.className='dtab'+(i===CUR.L?' on':'');
    d.innerHTML='<span class="ic">'+L.icon+'</span><span class="nm">'+L.name+'</span>';
    d.onclick=()=>selectDisease(i); c.appendChild(d); });
}
function buildStageSeg(){
  const L=curSet()[CUR.L]; const c=$('stageseg'); c.innerHTML='';
  L.stages.forEach((s,i)=>{ const b=document.createElement('button'); b.className=(i===CUR.S?'on':''); b.textContent=s.label;
    b.onclick=()=>selectStage(i); c.appendChild(b); });
}
function updateChrome(){
  const L=curSet()[CUR.L], st=L.stages[CUR.S];
  $('lbadge').textContent=L.icon;
  $('ltitle').textContent=L.name;
  $('ldesc').textContent=L.desc||'';
  $('curlabel').textContent='病態波形：'+L.name+'（'+st.label+'）';
  $('feathead').innerHTML='⭐ この波形の特徴：'+st.label;
  const ul=$('featlist'); ul.innerHTML=''; (st.feat||[]).forEach(f=>{ const li=document.createElement('li'); li.innerHTML=f; ul.appendChild(li); });
  // ghostトグルの有効/無効
  const canGhost=(st.mod!==undefined && CUR.S!==0);
  $('ghostWrap').classList.toggle('dis',!canGhost);
  $('ghostchk').checked=ghost&&canGhost;
  // levelセグメント
  Array.from($('levelSeg').children).forEach((b,i)=>b.classList.toggle('on',i===LEVEL));
  // dtab active
  Array.from($('dtabs').children).forEach((d,i)=>d.classList.toggle('on',i===CUR.L));
  // stage active
  Array.from($('stageseg').children).forEach((b,i)=>b.classList.toggle('on',i===CUR.S));
}

function selectLevel(lv){
  if(lv===LEVEL) return;
  LEVEL=lv; CUR={L:0,S:0}; ghost=false;
  buildDtabs(); buildStageSeg(); updateChrome();
  const L=curSet()[0]; paintTop(L); paintStatic(L,L.stages[0],0);
}
function selectDisease(i){
  const o={...CUR}; CUR={L:i,S:0};
  buildStageSeg(); updateChrome();
  const L=curSet()[i]; paintTop(L);
  transition(o.L,o.S,i,0);
}
function selectStage(s){
  const o={...CUR}; CUR={L:CUR.L,S:s};
  updateChrome();
  transition(o.L,o.S,CUR.L,s);
}

$('levelSeg').querySelectorAll('button').forEach(b=>b.onclick=()=>selectLevel(+b.dataset.lv));
$('ghostchk').onchange=e=>{ ghost=e.target.checked; const L=curSet()[CUR.L]; paintStatic(L,L.stages[CUR.S],CUR.S); };

// 初期表示
buildDtabs(); buildStageSeg(); updateChrome();
(function(){ const L=curSet()[0]; paintTop(L); paintStatic(L,L.stages[0],0); })();
</script>
